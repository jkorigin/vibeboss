name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  init-smoke:
    name: init.sh smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify python3
        run: python3 --version

      - name: Run init.sh smoke test
        run: bash tests/init-smoke.sh

  sensitivity-audit:
    name: Sensitivity audit (no personal/sensitive data leaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so --history mode works if invoked manually

      - name: Run sensitivity audit
        run: bash tests/audit-smoke.sh
