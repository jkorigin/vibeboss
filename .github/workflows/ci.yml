name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  init-smoke:
    name: init.sh smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify python3
        run: python3 --version

      - name: Run init.sh smoke test
        run: bash tests/init-smoke.sh
